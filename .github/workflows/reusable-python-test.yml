# Reusable workflow for testing Python packages in the nornir ecosystem
# This can be called from individual package repositories

name: Reusable Python Test Workflow

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions to test'
        required: false
        type: string
        default: '["3.13"]'
      test-pattern:
        description: 'Test file pattern for unittest discovery'
        required: false
        type: string
        default: 'test_*.py'
      test-directory:
        description: 'Directory containing tests'
        required: false
        type: string
        default: './test'
      needs-test-data-dirs:
        description: 'Whether to create test data directories'
        required: false
        type: boolean
        default: false
      install-extras:
        description: 'Extra dependencies to install (e.g., "[gpu]")'
        required: false
        type: string
        default: ''

env:
  CURSES: False
  TERM: xterm
  ECLIPSE: ECLIPSE

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ${{ fromJSON(inputs.python-versions) }}
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .${{ inputs.install-extras }}
    
    - name: Create test data directories (Unix)
      if: ${{ inputs.needs-test-data-dirs && runner.os != 'Windows' }}
      run: |
        mkdir -p ${{ github.workspace }}/testdata ${{ github.workspace }}/testdata_output
        echo "TESTINPUTPATH=${{ github.workspace }}/testdata" >> $GITHUB_ENV
        echo "TESTOUTPUTPATH=${{ github.workspace }}/testdata_output" >> $GITHUB_ENV
    
    - name: Create test data directories (Windows)
      if: ${{ inputs.needs-test-data-dirs && runner.os == 'Windows' }}
      run: |
        mkdir -p ${{ github.workspace }}\testdata 
        mkdir -p ${{ github.workspace }}\testdata_output
        echo "TESTINPUTPATH=${{ github.workspace }}\testdata" >> $env:GITHUB_ENV
        echo "TESTOUTPUTPATH=${{ github.workspace }}\testdata_output" >> $env:GITHUB_ENV
    
    - name: Run tests
      run: |
        python -m unittest discover -s ${{ inputs.test-directory }} -p '${{ inputs.test-pattern }}'
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          test-results/
          coverage.xml
        if-no-files-found: ignore
